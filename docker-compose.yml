version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beacon-postgres
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacondev
      POSTGRES_DB: beacon_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beacon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
